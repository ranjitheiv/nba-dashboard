function pickScenario(id) {
  nbScenario = id;
  renderNbPage();
  // Scroll to player picker after selecting scenario
  setTimeout(() => {
    const el = document.querySelectorAll('.nb-step')[1];
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

function togglePick(side, name, direction) {
  const map = side === 'home' ? nbHomePicks : nbAwayPicks;
  const cur = map.get(name);
  if (cur === direction) {
    map.delete(name); // clicking same direction deselects
  } else {
    map.set(name, direction); // set or switch direction
  }
  renderNbPage();
  const out = document.getElementById('nbOutput');
  if (out && out.innerHTML) out.scrollIntoView({ behavior:'smooth', block:'start' });
}

function setDial(d) {
  nbDial = d;
  renderNbPage();
}

function setDialAndRefresh(d) {
  nbDial = d;
  // Update step 3 dial buttons
  document.querySelectorAll('.nb-dial-opt').forEach(b => {
    const label = { mild:'Mild', strong:'Strong', extreme:'Extreme' };
    b.classList.toggle('active', b.textContent === (label[d] || d));
  });
  // Rebuild output
  submitNarrative();
}

// ── Build the output ──────────────────────────────────────
function submitNarrative() {
  const matrix  = NARRATIVE_MATRIX[nbScenario];
  const anchor  = calcAnchorScores(nbScenario, nbDial);
  const STATS_KEYS = ['pts','fga','tpm','tpa','reb','ast','stl','blk'];
  const STATS_LABELS = { pts:'PTS', fga:'FGA', tpm:'TPM', tpa:'TPA', reb:'REB', ast:'AST', stl:'STL', blk:'BLK' };

  // ── Summary table ─────────────────────────────────────
  const summaryRows = STATS_KEYS.map(key => {
    const [hm, am] = matrix[key];
    const hd = applyDial(hm, nbDial);
    const ad = applyDial(am, nbDial);
    const hDir = pillDir(hd);
    const aDir = pillDir(ad);
    return `<tr>
      <td style="text-align:right"><span class="pill pill-${hDir}">${hDir}</span></td>
      <td style="text-align:center;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-sub);font-size:12px">${STATS_LABELS[key]}</td>
      <td style="text-align:left"><span class="pill pill-${aDir}">${aDir}</span></td>
    </tr>`;
  }).join('');

  const homeNameShort = nbHomeTeam.split(' ').slice(-1)[0].toUpperCase();
  const awayNameShort = nbAwayTeam.split(' ').slice(-1)[0].toUpperCase();

  // ── Score anchor ──────────────────────────────────────
  const anchorHTML = `
    <div class="nb-score-anchor">
      <div class="nb-anchor-team">
        <div class="nb-anchor-name">${nbHomeTeam}</div>
        <div class="nb-anchor-score">${anchor.home}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="nb-anchor-sep">vs</div>
        <div class="nb-anchor-label">PROJECTED SCORE</div>
      </div>
      <div class="nb-anchor-team">
        <div class="nb-anchor-name">${nbAwayTeam}</div>
        <div class="nb-anchor-score">${anchor.away}</div>
      </div>
    </div>`;

  // ── Player projections ────────────────────────────────
  function buildProjTable(teamName, teamSide, picks, matrixIdx) {
    const players = getTeamPlayers(teamName);
    let totalPts = 0, totalPtsProj = 0;

    const rows = players.map(player => {
      const direction = picks.get(player.name) || null;
      const avgTpa = getPlayerAvg(player, 'tpa');

      const minScale = getMinScale(player);

      const cells = STATS_KEYS.map(key => {
        const vals = statValues(player, key);
        const avg  = getPlayerAvg(player, key);

        // No data — blank cell
        if (avg === 0 && !['stl','blk'].includes(key)) {
          return '<td></td>';
        }

        // New: gates-based narrative anchor (OR logic — star replaces narrative)
        const narrativeMult = matrix[key][matrixIdx];
        const projRaw = projectStatNarrative(vals, narrativeMult, direction, avgTpa, key, nbDial, minScale);
        if (projRaw === null || isNaN(projRaw)) return '<td></td>';
        const proj    = projRaw;
        const avgRnd  = Math.round(avg);

        // Direction from effective final multiplier
        const baseMult  = getBaseMult(direction, narrativeMult, key, avgTpa);
        const finalMult = 1.0 + (baseMult - 1.0) * DIAL_SCALE[nbDial] * minScale;
        const dir       = pillDir(finalMult);

        if (key === 'pts') {
          if (avg > 0) totalPts += avg;
          totalPtsProj += proj;
        }

        // No meaningful signal — show muted
        if (proj === avgRnd || dir === 'normal') {
          return `<td>
            <div class="nb-proj-cell">
              <div class="nb-proj-val" style="color:var(--text-sub)">${proj}</div>
              <div class="nb-proj-avg">(${avgRnd})</div>
            </div>
          </td>`;
        }

        return `<td>
          <div class="nb-proj-cell">
            <div class="nb-bubble nb-bubble-${dir[0]}">${dir[0].toUpperCase()}</div>
            <div class="nb-proj-val">${proj}</div>
            <div class="nb-proj-avg">(${avgRnd})</div>
          </div>
        </td>`;
      }).join('');

      const dirIcon = direction === 'up' ? '<span class="nb-star-badge" style="background:#d1fae5;color:#065f46;border-color:#6ee7b7">↑ UP</span>' : direction === 'down' ? '<span class="nb-star-badge" style="background:#fee2e2;color:#7f1d1d;border-color:#fca5a5">↓ DOWN</span>' : '';
      return `<tr>
        <td><div class="nb-player-cell"><span style="font-family:var(--font-condensed);font-size:13px;font-weight:700;color:var(--text)">${player.name}</span>${dirIcon}</div></td>
        ${cells}
      </tr>`;
    }).join('');

    const totalRow = `<tr class="nb-total-row">
      <td style="font-family:var(--font-condensed);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-sub)">TOTAL PTS</td>
      <td colspan="${STATS_KEYS.length}" style="text-align:left;font-family:var(--font-mono);font-size:14px;color:var(--text)">
        <span style="font-size:20px;font-weight:500">${totalPtsProj}</span>
        <span style="font-size:12px;color:var(--text-sub);margin-left:8px">vs projected ${anchor[teamSide === 0 ? 'home':'away']} · avg sum ${Math.round(totalPts)}</span>
      </td>
    </tr>`;

    const headers = STATS_KEYS.map(k => `<th>${STATS_LABELS[k]}</th>`).join('');
    return `
      <table class="nb-proj-tbl">
        <thead><tr>
          <th>Player</th>
          ${headers}
        </tr></thead>
        <tbody>${rows}${totalRow}</tbody>
      </table>`;
  }

  // Toggle between home/away
  const toggleHTML = `
    <div class="nb-toggle" id="nbToggle">
      <button class="nb-toggle-opt ${nbViewTeam==='home'?'active':''}" onclick="setNbView('home')">${nbHomeTeam}</button>
      <button class="nb-toggle-opt ${nbViewTeam==='away'?'active':''}" onclick="setNbView('away')">${nbAwayTeam}</button>
    </div>`;

  const projTable = nbViewTeam === 'home'
    ? buildProjTable(nbHomeTeam, 0, nbHomePicks, 0)
    : buildProjTable(nbAwayTeam, 1, nbAwayPicks, 1);

  const scenarioNames = {
    blowA: `${abbr(nbHomeTeam)} Blowout`,
    blowB: `${abbr(nbAwayTeam)} Blowout`,
    grind: 'Grind',
    shoot: 'Shootout',
  };

  document.getElementById('nbOutput').innerHTML = `
    <div style="border-top:2px solid var(--border-mid);padding-top:20px;">
      <div class="nb-section-title">NARRATIVE: ${scenarioNames[nbScenario].toUpperCase()}</div>
      <div class="nb-section-sub">${nbDial.charAt(0).toUpperCase()+nbDial.slice(1)} intensity · Round ${selRound}</div>

      <!-- SGM BUILDER -->
      <div style="margin-top:20px;margin-bottom:10px;">
        <div class="nb-section-title" style="font-size:16px">SGM BUILDER</div>
      </div>

      <div class="nb-summary-3col">
        <!-- Score panel -->
        <div class="nb-score-panel">
          ${espnLogoUrl(nbHomeTeam) ? `<img src="${espnLogoUrl(nbHomeTeam)}" alt="${nbHomeTeam}" style="width:68px;height:68px;object-fit:contain;opacity:0.9;margin-bottom:10px;" onerror="this.style.display='none'">` : ''}
          <div class="nb-score-panel-team">${nbHomeTeam}</div>
          <div class="nb-score-panel-num">${anchor.home}</div>
          <div class="nb-score-panel-vs">vs</div>
          <div class="nb-score-panel-num">${anchor.away}</div>
          <div class="nb-score-panel-team">${nbAwayTeam}</div>
          ${espnLogoUrl(nbAwayTeam) ? `<img src="${espnLogoUrl(nbAwayTeam)}" alt="${nbAwayTeam}" style="width:68px;height:68px;object-fit:contain;opacity:0.9;margin-top:10px;" onerror="this.style.display='none'">` : ''}
          <div class="nb-score-panel-label">Projected score</div>
        </div>

        <!-- SGM Builder panel -->
        <div class="nb-panel" style="padding:14px;">
          <!-- Category + Gate + Count row -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-family:var(--font-condensed);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-sub);">Category</span>
              <div class="sgm-cat-pills" id="sgmCatPills" style="margin:0;">
                ${['pts','fga','tpm','tpa','reb','ast','stl','blk'].map(k =>
                  `<button class="sgm-cat-pill ${k==='pts'?'active':''}" onclick="sgmSetCat('${k}')">${k.toUpperCase()}</button>`
                ).join('')}
              </div>
            </div>
            <span style="color:var(--border-hi);font-size:16px;">|</span>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-family:var(--font-condensed);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-sub);">Risk</span>
              <div class="sgm-gate-pills" id="sgmGatePills" style="margin:0;">
                <button class="sgm-gate-pill con active" onclick="sgmSetGate('conservative')">LOW</button>
                <button class="sgm-gate-pill mod" onclick="sgmSetGate('moderate')">MED</button>
                <button class="sgm-gate-pill agg" onclick="sgmSetGate('aggressive')">HIGH</button>
              </div>
            </div>

          </div>
          <!-- Builder table -->
          <div id="sgmTableWrap" style="overflow-x:auto;max-height:380px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;"></div>
          <!-- Current Selections -->
          <div class="sgm-selections" id="sgmSelections">
            <div class="sgm-sel-hdr" onclick="sgmToggleSel()" style="justify-content:space-between;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span id="sgmChevron" style="font-size:12px;color:var(--text-sub);transition:transform 0.2s;display:inline-block;transform:rotate(180deg);">▲</span>
                <span class="sgm-sel-title">Current Selections</span>
                <span class="sgm-leg-count" id="sgmCount2">0</span>
              </div>
              <button class="sgm-clear-btn" onclick="event.stopPropagation();sgmClearAll()">Clear all</button>
            </div>
            <div class="sgm-sel-body" id="sgmSelBody"></div>
          </div>
        </div>
      </div>

      <!-- Player Projections -->
      <div style="margin-top:20px;margin-bottom:10px">
        <div class="nb-section-title" style="font-size:16px">PLAYER PROJECTIONS</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        ${toggleHTML}
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:0.5px">( ) = series avg</span>
          <div class="nb-dial-wrap" id="nbDialInline">
            ${['mild','strong','extreme'].map(d => `<button class="nb-dial-opt ${nbDial===d?'active':''}" onclick="setDialAndRefresh('${d}')">${d==='mild'?'Mild':d==='strong'?'Strong':'Extreme'}</button>`).join('')}
          </div>
        </div>
      </div>
      <div style="overflow-x:auto;" id="nbProjWrap">${projTable}</div>
    </div>
  `;

  setTimeout(() => {
    document.getElementById('nbOutput').scrollIntoView({ behavior:'smooth', block:'start' });
    renderSGMBuilder();
  }, 120);
}

// ── SGM Builder state ─────────────────────────────────────
let sgmCat  = 'pts';
let sgmGate = 'conservative';
// selections: Map of "playerName|category" -> { player, team, category, gate, over, under }
let sgmSelections = new Map();

function sgmSetCat(cat) {
  sgmCat = cat;
  document.querySelectorAll('.sgm-cat-pill').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === cat));
  renderSGMBuilder();
}

function sgmSetGate(gate) {
  sgmGate = gate;
  document.querySelectorAll('.sgm-gate-pill').forEach(b => b.classList.remove('active'));
  const gateMap = { conservative:'con', moderate:'mod', aggressive:'agg' };
  document.querySelector(`.sgm-gate-pill.${gateMap[gate]}`)?.classList.add('active');
  renderSGMBuilder();
}

function sgmToggleSel() {
  const body    = document.getElementById('sgmSelBody');
  const chevron = document.getElementById('sgmChevron');
  if (body) {
    body.classList.toggle('open');
    if (chevron) chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
  }
}

function sgmClearAll() {
  sgmSelections.clear();
  renderSGMBuilder();
  renderSGMSelections();
}

function sgmToggleCheck(playerName, teamName) {
  const key = playerName + '|' + sgmCat;
  // Find the player object for min scale and star check
  const allTms = [nbHomeTeam, nbAwayTeam];
  let foundPlayer = null;
  let foundMatrixIdx = 0;
  for (let ti = 0; ti < allTms.length; ti++) {
    const plist = getTeamPlayers(allTms[ti]);
    const p = plist.find(pl => pl.name === playerName);
    if (p) { foundPlayer = p; foundMatrixIdx = ti; break; }
  }
  const sgmVals = getPlayerStatVals(playerName, teamName, sgmCat);
  const sgmAvgTpa = foundPlayer ? getPlayerAvg(foundPlayer, 'tpa') : 0;
  const sgmMinSc  = foundPlayer ? getMinScale(foundPlayer) : 0.2;
  const sgmDirection = (teamName === nbHomeTeam ? nbHomePicks : nbAwayPicks).get(playerName) || null;
  const sgmNarrMult = nbScenario ? NARRATIVE_MATRIX[nbScenario][sgmCat][foundMatrixIdx] : 1.0;
  const sgmAnchor = narrativeAnchor(sgmVals, sgmNarrMult, sgmDirection, sgmAvgTpa, sgmCat, nbDial, sgmMinSc);
  const tierMults2 = { conservative: 2.50, moderate: 1.80, aggressive: 1.10 };
  const gResult2  = sgmGatesFromAnchor(sgmVals, sgmAnchor, tierMults2[sgmGate]);
  const g = { ovr: gResult2.ovr, und: gResult2.und };
  if (sgmSelections.has(key)) {
    // If same player, same category but different gate — update gate
    const existing = sgmSelections.get(key);
    if (existing.gate === sgmGate) {
      // Same gate — uncheck
      sgmSelections.delete(key);
    } else {
      // Different gate — update to new gate
      existing.gate = sgmGate;
      existing.over = g ? g.ovr : null;
      existing.und  = g ? g.und : null;
      sgmSelections.set(key, existing);
    }
  } else {
    sgmSelections.set(key, {
      player: playerName,
      team: teamName,
      category: sgmCat,
      gate: sgmGate,
      over: g ? g.ovr : null,
      und:  g ? g.und : null
    });
  }
  renderSGMBuilder();
  renderSGMSelections();
}

function getPlayerStatVals(playerName, teamName, statKey) {
  const players = getTeamPlayers(teamName);
  const p = players.find(pl => pl.name === playerName);
  return p ? statValues(p, statKey) : [];
}

function renderSGMBuilder() {
  const wrap = document.getElementById('sgmTableWrap');
  if (!wrap) return;
  if (!nbScenario) { wrap.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--text-sub)">Select a narrative first.</div>'; return; }

  const STATS_KEYS = ['pts','fga','tpm','tpa','reb','ast','stl','blk'];
  const STATS_LABELS = { pts:'PTS',fga:'FGA',tpm:'TPM',tpa:'TPA',reb:'REB',ast:'AST',stl:'STL',blk:'BLK' };
  const matrix = NARRATIVE_MATRIX[nbScenario];

  // Merge both teams, sorted by avg in this category desc — matrixIdx tracks home(0)/away(1)
  const homePlayers = getTeamPlayers(nbHomeTeam);
  const awayPlayers = getTeamPlayers(nbAwayTeam);
  const allPlayers  = [
    ...homePlayers.map(p => ({ ...p, teamFull: nbHomeTeam, side: 'home', matrixIdx: 0 })),
    ...awayPlayers.map(p => ({ ...p, teamFull: nbAwayTeam, side: 'away', matrixIdx: 1 })),
  ].sort((a,b) => getPlayerAvg(b, sgmCat) - getPlayerAvg(a, sgmCat));

  // Games played in this series
  const games = [...new Set(
    allRows.filter(r => r.round==selRound && (r.team===nbHomeTeam || r.team===nbAwayTeam)).map(r=>r.game)
  )].sort((a,b)=>a-b);

  // Extra col?
  const showExtra = sgmCat === 'pts' || sgmCat === 'fga';
  const extraLabel = sgmCat === 'pts' ? 'AVG FGA' : 'AVG PTS';
  const extraKey   = sgmCat === 'pts' ? 'fga' : 'pts';
  const showExtraTp = sgmCat === 'tpm' || sgmCat === 'tpa';
  const extraLabelTp = sgmCat === 'tpm' ? 'AVG TPA' : 'AVG TPM';
  const extraKeyTp   = sgmCat === 'tpm' ? 'tpa' : 'tpm';

  const gameHeaders = games.map(g => `<th>GM${g}</th>`).join('');
  const extraHeader = (showExtra || showExtraTp)
    ? `<th>${showExtra ? extraLabel : extraLabelTp}</th>`
    : '';

  const rows = allPlayers.map(player => {
    const avg  = getPlayerAvg(player, sgmCat);
    const vals = statValues(player, sgmCat);
    const avgTpaSgm   = getPlayerAvg(player, 'tpa');
    // Fix: use Map.get() not Array.includes()
    const sgmDir      = (player.side === 'home' ? nbHomePicks : nbAwayPicks).get(player.name) || null;
    const minScaleSgm = getMinScale(player);
    // Fix: use player.matrixIdx which is now correctly set above
    const narrativeMultSgm = matrix[sgmCat][player.matrixIdx];
    const tierMults = { conservative: 2.50, moderate: 1.80, aggressive: 1.10 };
    const tierMult = tierMults[sgmGate];

    // Narrative-adjusted anchor using gates projection + direction
    const anchorSgm = narrativeAnchor(vals, narrativeMultSgm, sgmDir, avgTpaSgm, sgmCat, nbDial, minScaleSgm);
    const gResult   = sgmGatesFromAnchor(vals, anchorSgm, tierMult);
    const over  = (gResult.ovr !== null && !isNaN(gResult.ovr)) ? gResult.ovr : '—';
    const under = (gResult.und !== null && !isNaN(gResult.und)) ? gResult.und : '—';

    const key       = player.name + '|' + sgmCat;
    const isChecked = sgmSelections.has(key);

    const teamCls  = player.side === 'home' ? 'sgm-team-home' : 'sgm-team-away';
    const teamAbbrV = abbr(player.teamFull);

    // Extra col
    let extraCell = '';
    if (showExtra || showExtraTp) {
      const eKey = showExtra ? extraKey : extraKeyTp;
      const eAvg = getPlayerAvg(player, eKey);
      extraCell = `<td style="color:var(--text-sub);font-size:11px">${eAvg > 0 ? Math.round(eAvg) : '—'}</td>`;
    }

    // Game value cells
    const gameCells = games.map(gn => {
      const row = player.games[gn];
      if (!row || row.isDNP) return '<td class="sgm-game-empty">—</td>';
      const v = row[sgmCat];
      if (v === null || v === 0) return '<td class="sgm-game-empty">—</td>';
      // Apply same CF as stats table
      const cfg = CF[sgmCat];
      let bgStyle = '', colorStyle = '', fontStyle = '';
      if (cfg) {
        let tierIdx = -1;
        for (let i = cfg.tiers.length-1; i >= 0; i--) {
          if (v >= cfg.tiers[i]) { tierIdx = i; break; }
        }
        if (tierIdx >= 0) {
          const level = CF_LEVELS[Math.min(tierIdx, CF_LEVELS.length-1)];
          bgStyle    = `background:${level.bg};`;
          colorStyle = `color:${level.text};`;
          fontStyle  = tierIdx >= 3 ? 'font-weight:600;' : '';
        }
      }
      return `<td style="${bgStyle}${colorStyle}${fontStyle}">${v}</td>`;
    }).join('');

    // Mini sparkline
    const spark = buildMiniSparkline(vals);

    return `<tr>
      <td style="min-width:160px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="sgm-check ${isChecked?'checked':''}" onclick="sgmToggleCheck('${player.name.replace(/'/g,"\'")}','${player.teamFull.replace(/'/g,"\'")}')">✓</div>
          <div style="display:flex;align-items:center;gap:5px;">
            <span class="sgm-player-name">${player.name}</span>
            <span class="${teamCls}">${teamAbbrV}</span>
          </div>
        </div>
      </td>
      <td style="text-align:center;">${player.pos ? `<span class="pos-bubble ${player.pos==='PG'||player.pos==='SG'||player.pos==='G'?'pos-g':player.pos==='PF'||player.pos==='SF'||player.pos==='F'?'pos-f':player.pos==='C'?'pos-c':'pos-other'}">${player.pos}</span>` : ''}</td>
      <td class="sgm-over">${over}</td>
      <td class="sgm-under">${under}</td>
      ${gameCells}
      <td>${spark}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="sgm-tbl">
    <thead><tr>
      <th>Player</th>
      <th>Pos</th>
      <th class="sgm-over">Over</th>
      <th class="sgm-under">Under</th>
      ${extraHeader}
      ${gameHeaders}
      <th>Range</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  // Update counts
  const count = sgmSelections.size;
  const c2 = document.getElementById('sgmCount2'); if(c2) c2.textContent = count;
}

function buildMiniSparkline(vals) {
  if (!vals.length) return '<svg width="120" height="42"></svg>';
  const W=120, H=42, pad=10, trackY=28, labelY=12;
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const avgV = vals.reduce((a,b)=>a+b,0)/vals.length;
  const med  = median(vals);
  const span = maxV - minV || 1;
  const toX  = v => pad + ((v-minV)/span)*(W-pad*2);
  const fmt  = v => Number.isInteger(v) ? v : v.toFixed(1);

  const track = `<line x1="${pad}" y1="${trackY}" x2="${W-pad}" y2="${trackY}" stroke="#e4e9f0" stroke-width="3" stroke-linecap="round"/>`;
  const fill  = `<line x1="${pad}" y1="${trackY}" x2="${toX(avgV)}" y2="${trackY}" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>`;

  // Deduplicate positions to avoid overlapping labels
  const pts = [
    { v:minV, col:'#dc2626', label:fmt(minV) },
    { v:Math.round(avgV*10)/10, col:'#2563eb', label:fmt(avgV) },
    { v:med,  col:'#6b7280', label:fmt(med) },
    { v:maxV, col:'#059669', label:fmt(maxV) },
  ];

  const dots   = pts.map(p => `<circle cx="${toX(p.v)}" cy="${trackY}" r="4" fill="${p.col}" stroke="white" stroke-width="1.5"/>`).join('');
  // Labels above dots — alternate above/below for min and max to reduce overlap
  const labels = pts.map((p, i) => {
    const x    = toX(p.v);
    const y    = (i === 0 || i === 2) ? labelY : labelY + 2; // slight variation
    return `<text x="${x}" y="${y}" text-anchor="middle" font-family="monospace" font-size="8" fill="${p.col}">${p.label}</text>`;
  }).join('');

  return `<svg width="${W}" height="${H}" class="sgm-spark" viewBox="0 0 ${W} ${H}">${track}${fill}${dots}${labels}</svg>`;
}

function renderSGMSelections() {
  const body = document.getElementById('sgmSelBody');
  if (!body) return;

  const count = sgmSelections.size;
  const c2 = document.getElementById('sgmCount2'); if(c2) c2.textContent = count;

  if (!count) {
    body.innerHTML = '<div style="font-size:12px;color:var(--text-sub);padding:6px 0;">No legs selected yet.</div>';
    return;
  }

  const riskBadge = gate => {
    const map = { conservative:['LOW','risk-low'], moderate:['MED','risk-med'], aggressive:['HIGH','risk-high'] };
    const [label, cls] = map[gate] || ['?',''];
    return `<span class="sgm-risk-badge ${cls}">${label}</span>`;
  };

  let i = 1;
  body.innerHTML = [...sgmSelections.values()].map(sel => {
    const overStr  = sel.over !== null ? sel.over : '—';
    const undStr   = sel.und  !== null ? sel.und  : '—';
    const teamA = sel.team === nbHomeTeam ? nbHomeTeam : nbAwayTeam;
    return `<div class="sgm-sel-row">
      <span class="sgm-sel-num">${i++}</span>
      <span class="sgm-sel-player">${sel.player}</span>
      <span class="sgm-sel-cat">${abbr(teamA)}</span>
      <span class="sgm-sel-cat">${sel.category.toUpperCase()}</span>
      ${riskBadge(sel.gate)}
      <span class="sgm-sel-lines">Ovr ${overStr} / Und ${undStr}</span>
    </div>`;
  }).join('');
}

function setNbView(side) {
  nbViewTeam = side;
  // Re-render just the proj table
  const matrix   = NARRATIVE_MATRIX[nbScenario];
  const anchor   = calcAnchorScores(nbScenario, nbDial);
  const STATS_KEYS = ['pts','fga','tpm','tpa','reb','ast','stl','blk'];
  const STATS_LABELS = { pts:'PTS', fga:'FGA', tpm:'TPM', tpa:'TPA', reb:'REB', ast:'AST', stl:'STL', blk:'BLK' };

  function buildProjTable(teamName, teamSide, picks, matrixIdx) {
    const players = getTeamPlayers(teamName);
    let totalPts = 0, totalPtsProj = 0;

    const rows = players.map(player => {
      const direction = picks.get(player.name) || null;
      const avgTpa = getPlayerAvg(player, 'tpa');

      const cells = STATS_KEYS.map(key => {
        const vals = statValues(player, key);
        const avg  = getPlayerAvg(player, key);

        // No data — blank cell
        if (avg === 0 && !['stl','blk'].includes(key)) {
          return '<td></td>';
        }

        const narrativeMult = matrix[key][matrixIdx];
        const minScale2     = getMinScale(player);
        const projRaw2      = projectStatNarrative(vals, narrativeMult, direction, avgTpa, key, nbDial, minScale2);
        if (projRaw2 === null || isNaN(projRaw2)) return '<td></td>';
        const proj   = projRaw2;
        const avgRnd = Math.round(avg);
        const bm     = getBaseMult(direction, narrativeMult, key, avgTpa);
        const fm     = 1.0 + (bm - 1.0) * DIAL_SCALE[nbDial] * minScale2;
        const dir    = pillDir(fm);

        if (key === 'pts') {
          if (avg > 0) totalPts += avg;
          totalPtsProj += proj;
        }

        // If projection rounds to same as average — no meaningful signal, show muted
        if (proj === avgRnd || dir === 'normal') {
          return `<td>
            <div class="nb-proj-cell">
              <div class="nb-proj-val" style="color:var(--text-sub)">${proj}</div>
              <div class="nb-proj-avg">(${avgRnd})</div>
            </div>
          </td>`;
        }

        return `<td>
          <div class="nb-proj-cell">
            <div class="nb-bubble nb-bubble-${dir[0]}">${dir[0].toUpperCase()}</div>
            <div class="nb-proj-val">${proj}</div>
            <div class="nb-proj-avg">(${avgRnd})</div>
          </div>
        </td>`;
      }).join('');

      const dirIcon = direction === 'up' ? '<span class="nb-star-badge" style="background:#d1fae5;color:#065f46;border-color:#6ee7b7">↑ UP</span>' : direction === 'down' ? '<span class="nb-star-badge" style="background:#fee2e2;color:#7f1d1d;border-color:#fca5a5">↓ DOWN</span>' : '';
      return `<tr>
        <td><div class="nb-player-cell"><span style="font-family:var(--font-condensed);font-size:13px;font-weight:700;color:var(--text)">${player.name}</span>${dirIcon}</div></td>
        ${cells}
      </tr>`;
    }).join('');

    const totalRow = `<tr class="nb-total-row">
      <td style="font-family:var(--font-condensed);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-sub)">TOTAL PTS</td>
      <td colspan="${STATS_KEYS.length}" style="text-align:left;font-family:var(--font-mono);font-size:14px;color:var(--text)">
        <span style="font-size:20px;font-weight:500">${totalPtsProj}</span>
        <span style="font-size:12px;color:var(--text-sub);margin-left:8px">vs projected ${anchor[matrixIdx===0?'home':'away']} · avg sum ${Math.round(totalPts)}</span>
      </td>
    </tr>`;

    const headers = STATS_KEYS.map(k => `<th>${STATS_LABELS[k]}</th>`).join('');
    return `
      <table class="nb-proj-tbl">
        <thead><tr>
          <th>Player</th>
          ${headers}
        </tr></thead>
        <tbody>${rows}${totalRow}</tbody>
      </table>`;
  }

  // Update toggle
  document.querySelectorAll('.nb-toggle-opt').forEach(b => {
    b.classList.toggle('active', b.textContent === (side==='home'?nbHomeTeam:nbAwayTeam));
  });

  document.getElementById('nbProjWrap').innerHTML = side === 'home'
    ? buildProjTable(nbHomeTeam, 0, nbHomePicks, 0)
    : buildProjTable(nbAwayTeam, 1, nbAwayPicks, 1);
}

// Activate nb button when round + team are selected
function updateNbBtn() {
  const wrap = document.getElementById('nbBtnWrap');
  const btn  = document.getElementById('nbBtn');
  if (!btn || !wrap) return;
  if (btn.classList.contains('back')) return; // in NB mode — don't touch
  wrap.style.display = (selRound && selTeam) ? 'block' : 'none';
}

// ══════════════════════════════════════════════════════════
//  LOCK SCREEN
// ══════════════════════════════════════════════════════════
function initApp() {
  if (localStorage.getItem('nba_unlocked') === PASSWORD) {
    document.getElementById('lockScreen').style.display='none';
    fetchData();
  }
}

function checkPassword() {
  const input = document.getElementById('lockInput').value;
  if (input === PASSWORD) {
    localStorage.setItem('nba_unlocked', PASSWORD);
    document.getElementById('lockScreen').style.display='none';
    fetchData();
  } else {
    const inp = document.getElementById('lockInput');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    document.getElementById('lockError').textContent='Incorrect password';
    inp.value='';
    setTimeout(()=>inp.classList.remove('shake'), 400);
  }
}

document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key==='Enter') checkPassword();
});

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
initApp();
</script>
